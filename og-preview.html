<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #111110;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 64px 72px;
    font-family: 'Inter', sans-serif;
  }

  /* Top row */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .monogram {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #c8b99a;
  }
  .tagline {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* Center */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 0;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8b99a;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: #c8b99a;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 88px;
    font-weight: 500;
    line-height: 0.95;
    color: #f5f0e8;
    letter-spacing: -0.01em;
  }
  h1 em {
    font-style: italic;
    color: #c8b99a;
  }
  .sub {
    margin-top: 28px;
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.06em;
  }

  /* Bottom */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .services {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .services span {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: inline-block;
  }
  .url {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
  }

  /* Decorative line */
  .deco-line {
    position: absolute;
    right: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, transparent, #c8b99a 30%, #c8b99a 70%, transparent);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>

  <div class="top">
    <div class="monogram">M · F</div>
    <div class="tagline">Wien · Meidling</div>
  </div>

  <div class="center">
    <div class="eyebrow">Friseur &amp; Beauty · Seit 25 Jahren</div>
    <h1>Mode Friseur<br><em>Yüksel.</em></h1>
    <div class="sub">Ratschkygasse 6 · 1120 Wien · Termin online buchen</div>
  </div>

  <div class="bottom">
    <div class="services">
      <span>Damen</span>
      <span class="dot"></span>
      <span>Herren</span>
      <span class="dot"></span>
      <span>Beauty</span>
      <span class="dot"></span>
      <span>Hochzeit</span>
    </div>
    <div class="url">www.modefriseuryuksel.at</div>
  </div>
</body>
</html>
