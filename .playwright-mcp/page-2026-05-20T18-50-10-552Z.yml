        - link "SRV" [ref=e613] [cursor=pointer]:
          - /url: https://www.whatsmydns.net/dns-lookup/srv-records
        - text: .
      - heading "Make sure to check all your DNS records" [level=2] [ref=e614]
      - paragraph [ref=e615]: When checking DNS records, there are often multiple record types that you need to verify are correct. For example, websites sometimes include www or other subdomains as either an A or CNAME record, and email servers use the MX record type.
