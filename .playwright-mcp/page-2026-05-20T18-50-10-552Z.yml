    - generic [ref=e511]:
      - heading "Global DNS Checker - How to check DNS propagation" [level=2] [ref=e512]
      - paragraph [ref=e513]: whatsmydns.net is a free online tool that lets you quickly and easily perform a DNS lookup to check DNS propagation and see information of any domain from DNS servers located in many countries all around the world.
      - paragraph [ref=e514]: You can test changes made to new or existing domains and see if they have been updated correctly without the need to manually query remote servers. This gives you immediate insight into how users globally may be resolving DNS records for your website, email or other online service.
      - paragraph [ref=e515]:
        - text: Many operating systems include
        - link "DNS tools" [ref=e516] [cursor=pointer]:
          - /url: /dns-tools.html
        - text: to check DNS records manually for diagnosing problems. However, using these tools can be complicated and difficult to understand for non-technical people which is why the whatsmydns.net DNS checker was created to help with quickly checking DNS propagation.
      - paragraph [ref=e517]: whatsmydns.net makes the process of performing global DNS checks easy by maintaining a range of DNS servers to perform lookups with. These results are then parsed and displayed on a map so that results are easier to understand at a glance. Individual lookup results can be seen in detail by selecting a server location from the list or clicking on the map markers once a search has been completed.
      - heading "What is DNS and how does it work?" [level=2] [ref=e518]
      - paragraph [ref=e519]:
        - text: The Domain Name System (known as DNS) is a system used to convert a name (like
        - code [ref=e520]: www.google.com
        - text: ) into an IP address (like
        - code [ref=e521]: 192.168.2.1
        - text: ). These addresses are used by computers to communicate with each other on the internet. Most people find remembering names much easier than numbers, so DNS makes this process easy.
      - paragraph [ref=e522]:
        - text: When you visit a website, your computer, phone or tablet will first check your local DNS cache for the corresponding IP address. If your device has not recently looked up this website, then it will need to ask your configured DNS server which will forward the request on to the DNS server responsible for managing the records. This process is known as a
        - link "DNS lookup" [ref=e523] [cursor=pointer]:
          - /url: /dns-lookup
        - text: request.
      - paragraph [ref=e524]: Once the IP address is known, it is stored locally for a set period of time known as the Time To Live (TTL) and used to speed up future requests. Updated records will not be returned until this time has expired, this can often be the cause of why DNS changes do not appear to be working right away.
      - heading "What is DNS propagation?" [level=2] [ref=e525]
      - paragraph [ref=e526]: DNS propagation is the term commonly used to check the current state of DNS results globally and is often asked about when changes made to DNS zones do not appear to be working as expected. This process can take from only a few minutes, but often takes up to 48-72 hours and sometimes longer.
      - paragraph [ref=e527]:
        - text: While technically DNS does not propagate, this is the term that people have become familiar with. DNS requests are recursively forwarded and looked up from the locally used resolver to the authoritative name server on demand and then cached to speed up future lookup requests. For this reason, commonly used
        - link "DNS servers" [ref=e528] [cursor=pointer]:
          - /url: /dns
        - text: of large network providers located around the world have been selected when performing DNS checks.
      - paragraph [ref=e529]: For popular websites, DNS results may be cached for people in different parts of the world using many different recursive DNS resolvers. If you have recently made changes to your configuration, and the TTL has not yet expired, then some people may be receiving out of date results which could mean that they see an older version of your website.
      - heading "How long does DNS propagation take?" [level=3] [ref=e530]
      - paragraph [ref=e531]: How long DNS propagation takes usually depends on your records TTL setting. This can be anywhere from several minutes up to 48-72 hours or longer. However, there are sometimes other reasons for a long propagation time.
      - paragraph [ref=e532]: "The main issues as to why DNS propagation can take so long are:"
      - paragraph [ref=e533]:
        - strong [ref=e534]: DNS Cache
        - text: "- The Time to Live (TTL) is the duration in which DNS data is allowed to 'live' in the cache of a local device or DNS resolver. When this duration expires, the local device or server removes existing DNS information and carries out another DNS lookup to fetch new information. Higher TTL settings can often cause a delay in DNS propagation."
      - paragraph [ref=e535]:
        - strong [ref=e536]: Internet Service Providers
        - text: "- Your ISP also caches DNS results, which allows for many users to access sites faster. For every website requested, they will ask the DNS server responsible only once but return the same result for many users. Some ISPs also overlook TTL rules, keeping a cached DNS record even if the TTL has expired. This can make DNS propagation take longer than it should."
      - paragraph [ref=e537]:
        - strong [ref=e538]: Other DNS Servers
        - text: "- You may not be using your ISPs DNS server, if this is the case then the same issues that may be causing delays can still apply."
      - paragraph [ref=e539]:
        - strong [ref=e540]: Domain Name Registrar
        - text: "- When changing web hosting or DNS providers for your domain, it is often also required to update your authoritative name servers. These changes will need to be reflected in the corresponding TLD nameserver for your domain name. For example, if you were to change the NS records for example.com, then the .com TLD nameserver would also need to update which can cause delays in DNS propagation."
      - heading "How do you speed up DNS propagation?" [level=3] [ref=e541]
      - paragraph [ref=e542]: A technique used to speed up DNS propagation and prevent a delay is to lower your DNS records TTL a few days in advance of making any changes so that when the change is made any old records expire more quickly. Unfortunately, most people who are having issues and trying to speed up DNS propagation only find this out after making changes and are wondering why they're not seeing instant results.
      - paragraph [ref=e543]:
        - text: If you have checked DNS globally, and are seeing different results locally then you may consider
        - link "flushing your DNS cache" [ref=e544] [cursor=pointer]:
          - /url: /flush-dns.html
        - text: ", or using another"
        - link "DNS server" [ref=e545] [cursor=pointer]:
          - /url: /dns
        - text: . As a last resort, manually overriding your local DNS entries in your systems
        - link "hosts file" [ref=e546] [cursor=pointer]:
          - /url: /hosts-file.html
        - text: can also be done but should be considered a temporary measure and only works for certain record types.
      - heading "What server types are used in a DNS check?" [level=2] [ref=e547]
      - paragraph [ref=e548]: There are 4 different types of DNS servers involved when performing a DNS check. Each has a different role and may not be needed at all depending on the situation, having all these different server types is what contributes to DNS propagation issues.
      - paragraph [ref=e549]:
        - strong [ref=e550]: Recursive Resolver
        - text: "- The DNS server your device communicates with is called the recursive resolver and is issued to you automatically by your ISP, but can be also configured on your router or individual devices. These DNS severs are ideally located in close geographical proximity to return results as fast as possible. These servers will cache a copy of the DNS results to speed up future DNS lookup requests."
      - paragraph [ref=e551]:
        - strong [ref=e552]: Root Name Server
        - text: "- This type of DNS server is responsible for returning the IP address of the TLD (Top Level Domain) nameserver. For instance, if it is trying to resolve example.com, the root name server returns the IP of the TLD name server that runs .com domains."
      - paragraph [ref=e553]:
        - strong [ref=e554]: TLD Name Server
        - text: "- This name server returns the authoritative name servers for each domain under the Top Level Domain it's responsible for. The .com TLD name server will return results for example.com but not example.org."
      - paragraph [ref=e555]:
        - strong [ref=e556]: Authoritative Name Server
        - text: "- This stores DNS servers' configuration data for specific domain names."
      - heading "What happens when a DNS request is made?" [level=2] [ref=e557]
      - paragraph [ref=e558]:
        - text: Below demonstrates the flow of events when a user requests to visit
        - code [ref=e559]: www.example.com
        - text: in their web browser for the first time and does not yet have cached results. As you can see, each step introduces the possibility of a DNS propagation delay.
