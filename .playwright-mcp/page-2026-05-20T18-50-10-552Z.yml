      - heading "Which DNS record types can be checked?" [level=2] [ref=e595]
      - paragraph [ref=e596]: "You can check DNS propagation for common record types including:"
      - list [ref=e597]:
        - listitem [ref=e598]:
          - link "A" [ref=e599] [cursor=pointer]:
            - /url: https://www.whatsmydns.net/dns-lookup/a-records
          - text: "- The most common DNS record, used to point a domain to an IP address."
        - listitem [ref=e600]:
          - link "CNAME" [ref=e601] [cursor=pointer]:
            - /url: https://www.whatsmydns.net/dns-lookup/cname-records
          - text: "- Also known as alias records, they point to other DNS records. Sometimes used for subdomains like www."
        - listitem [ref=e602]:
          - link "MX" [ref=e603] [cursor=pointer]:
            - /url: https://www.whatsmydns.net/dns-lookup/mx-records
          - text: "- Mail Exchanger records are used set email servers and their priority."
        - listitem [ref=e604]:
          - link "NS" [ref=e605] [cursor=pointer]:
            - /url: https://www.whatsmydns.net/dns-lookup/ns-records
          - text: "- Name Server records store the authoritative nameserver."
        - listitem [ref=e606]:
          - link "TXT" [ref=e607] [cursor=pointer]:
            - /url: https://www.whatsmydns.net/dns-lookup/txt-records
          - text: "- Text records are commonly used for configuration settings such as SPF and DKIM records."
      - paragraph [ref=e608]:
        - text: "Additional types that can be checked which are usually used in more advanced configurations include:"
        - link "AAAA" [ref=e609] [cursor=pointer]:
          - /url: https://www.whatsmydns.net/dns-lookup/aaaa-records
        - text: ","
        - link "CAA" [ref=e610] [cursor=pointer]:
